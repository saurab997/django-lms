{% extends 'library/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Delete Book Confirmation</h4>
            </div>
            <div class="card-body p-4 text-center">
                <h5 class="card-title mb-3">Are you sure you want to delete this book?</h5>
                <p class="card-text text-muted fs-5">"<strong>{{ book.title }}</strong>" by {{ book.author.name }}</p>
                
                <form method="POST" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger">Yes, Delete Permanently</button>
                        <a href="{% url 'book_detail' pk=book.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
